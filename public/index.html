<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AgenTank Official Replay Loader</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111316;
      --panel: #191d22;
      --panel-2: #20262d;
      --line: #303842;
      --text: #eef2f5;
      --muted: #9aa6b2;
      --left: #39a7ff;
      --right: #ff6b6b;
      --star: #ffd84d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      height: 100vh;
      display: grid;
      grid-template-columns: minmax(420px, 1fr) 360px;
      gap: 18px;
      padding: 18px;
      overflow: hidden;
    }
    .stage, aside {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      height: calc(100vh - 36px);
      min-height: 0;
    }
    .stage {
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto auto auto;
      overflow: hidden;
    }
    .battle-stage {
      position: relative;
      display: grid;
      place-items: center;
      min-height: min(720px, calc(100vh - 220px));
      overflow: hidden;
      padding: 14px;
      background:
        radial-gradient(circle at 50% 35%, rgba(217, 181, 93, 0.08), transparent 42%),
        linear-gradient(180deg, #0d140d, #070c09);
      outline: none;
    }
    .battle-stage:focus-visible {
      box-shadow: inset 0 0 0 3px rgba(217, 181, 93, 0.26);
    }
    .battle-empty {
      color: var(--muted);
      font-size: 14px;
      text-align: center;
    }
    .playground {
      --tile: 50px;
      position: relative;
      overflow: hidden;
      border: 3px solid #231d16;
      background:
        linear-gradient(180deg, rgba(255, 250, 220, 0.12), rgba(97, 83, 43, 0.08)),
        #c7b676;
      background-size: auto, auto, 50px 50px;
      box-shadow:
        inset 0 0 0 5px rgba(255, 250, 240, 0.38),
        0 16px 40px rgba(0, 0, 0, 0.34);
      image-rendering: pixelated;
      transform-origin: center;
    }
    .tile, .star, .tank-sprite, .bullet-sprite, .impact-burst {
      position: absolute;
      width: var(--tile);
      height: var(--tile);
    }
    .tile {
      z-index: 1;
      background-size: 100% 100%;
    }
    .tile.floor {
      background:
        linear-gradient(135deg, rgba(255,255,255,0.08), transparent 48%),
        linear-gradient(315deg, rgba(94,78,38,0.08), transparent 54%),
        #c6b675;
    }
    .tile.stone {
      background:
        linear-gradient(135deg, rgba(255,255,255,0.18), transparent 44%),
        linear-gradient(315deg, rgba(0,0,0,0.28), transparent 48%),
        repeating-linear-gradient(45deg, rgba(0,0,0,0.11) 0 4px, transparent 4px 12px),
        #6a6559;
      box-shadow: inset 0 -4px 0 rgba(0,0,0,0.22), inset 4px 0 0 rgba(255,255,255,0.08);
    }
    .tile.dirt {
      background:
        radial-gradient(circle at 34% 31%, rgba(255,240,180,0.22), transparent 21%),
        radial-gradient(circle at 67% 62%, rgba(83,45,24,0.35), transparent 26%),
        linear-gradient(135deg, #a78250, #6c4b31);
      box-shadow: inset 0 -5px 0 rgba(44,25,16,0.34);
    }
    .tile.grass {
      z-index: 3;
      background:
        repeating-linear-gradient(100deg, rgba(255,255,255,0.08) 0 3px, transparent 3px 10px),
        radial-gradient(circle at 28% 25%, rgba(160,224,118,0.36), transparent 30%),
        #526b37;
      opacity: 0.62;
      pointer-events: none;
    }
    .star {
      z-index: 4;
      transform: translate(var(--x), var(--y));
      filter: drop-shadow(0 0 8px rgba(255, 216, 77, 0.9));
    }
    .star::before {
      content: "";
      position: absolute;
      inset: 8px;
      background: linear-gradient(135deg, #fff2a8, #ffbb38);
      clip-path: polygon(50% 0, 61% 34%, 98% 35%, 68% 56%, 79% 91%, 50% 70%, 21% 91%, 32% 56%, 2% 35%, 39% 34%);
      animation: star-pulse 900ms ease-in-out infinite alternate;
    }
    .tank-sprite {
      z-index: 5;
      transform: translate(var(--x), var(--y));
      transition: transform var(--frame-ms, 160ms) linear, opacity 160ms ease, filter 160ms ease;
      filter: drop-shadow(0 5px 3px rgba(0,0,0,0.34));
      will-change: transform;
    }
    .tank-machine {
      position: absolute;
      inset: 0;
      transform: rotate(var(--rot));
      transition: transform var(--frame-ms, 160ms) linear;
      transform-origin: 50% 50%;
    }
    .tank-sprite.crashed {
      opacity: 0.38;
      filter: grayscale(1) drop-shadow(0 5px 3px rgba(0,0,0,0.28));
    }
    .tank-sprite.cloaked {
      opacity: 0.58;
    }
    .tank-sprite.in-grass .tank-machine {
      opacity: 0.54;
      filter: saturate(0.78) brightness(0.92);
    }
    .tank-sprite.in-grass .tank-hud {
      transform: translateX(-50%) translateY(-2px);
    }
    .tank-aura {
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 3px solid transparent;
      opacity: 0;
      pointer-events: none;
    }
    .tank-sprite.has-skill .tank-aura {
      opacity: 0.78;
      border-color: var(--skill-color, #ffd84d);
      box-shadow: 0 0 14px var(--skill-color, #ffd84d);
      animation: aura-spin 900ms linear infinite;
    }
    .tank-body {
      position: absolute;
      left: 9px;
      top: 13px;
      width: 32px;
      height: 24px;
      border: 2px solid rgba(26, 18, 12, 0.82);
      border-radius: 7px 12px 12px 7px;
      background:
        linear-gradient(90deg, rgba(255,255,255,0.22), transparent 34%),
        linear-gradient(180deg, var(--tank-hi), var(--tank-color));
      box-shadow:
        inset 0 -4px 0 rgba(0,0,0,0.2),
        -4px 0 0 rgba(0,0,0,0.18),
        4px 0 0 rgba(0,0,0,0.18);
    }
    .tank-track {
      position: absolute;
      left: 6px;
      width: 38px;
      height: 8px;
      border-radius: 999px;
      background:
        repeating-linear-gradient(90deg, rgba(255,255,255,0.16) 0 2px, transparent 2px 6px),
        #322a24;
      box-shadow: inset 0 -2px 0 rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.28);
    }
    .tank-track.top {
      top: 9px;
    }
    .tank-track.bottom {
      top: 33px;
    }
    .tank-cannon {
      position: absolute;
      left: 30px;
      top: 21px;
      width: 20px;
      height: 8px;
      border-radius: 999px;
      background: #f6f1de;
      box-shadow: inset 0 -2px 0 rgba(0,0,0,0.18);
    }
    .tank-hud {
      position: absolute;
      left: 50%;
      top: -32px;
      z-index: 2;
      display: grid;
      justify-items: center;
      gap: 2px;
      width: 118px;
      transform: translateX(-50%);
      pointer-events: none;
    }
    .tank-name,
    .tank-skill {
      max-width: 118px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 999px;
      background: rgba(7, 12, 9, 0.82);
      box-shadow: 0 2px 6px rgba(0,0,0,0.34);
      text-shadow: 0 1px 2px #000;
    }
    .tank-name {
      padding: 2px 7px;
      color: #fff7dc;
      font-size: 10px;
      font-weight: 800;
      line-height: 1.15;
    }
    .tank-skill {
      display: none;
      padding: 1px 6px;
      color: var(--skill-color, #ffd84d);
      font-size: 9px;
      font-weight: 800;
      line-height: 1.15;
    }
    .tank-sprite.has-skill .tank-skill {
      display: block;
    }
    .bullet-sprite {
      z-index: 6;
      transform: translate(var(--x), var(--y)) rotate(var(--rot));
      transition: transform var(--frame-ms, 160ms) linear;
      filter: drop-shadow(0 0 8px var(--bullet-glow));
      will-change: transform;
    }
    .bullet-sprite::before {
      content: "";
      position: absolute;
      left: 17px;
      top: 17px;
      width: 16px;
      height: 16px;
      border-radius: 50% 50% 46% 46%;
      background: radial-gradient(circle at 35% 30%, #fff8cf, var(--bullet-color) 48%, var(--bullet-shadow) 76%);
    }
    .bullet-sprite::after {
      content: "";
      position: absolute;
      left: 22px;
      top: 30px;
      width: 7px;
      height: 17px;
      border-radius: 999px;
      background: radial-gradient(circle at 50% 16%, rgba(255,250,180,0.95), var(--bullet-tail) 42%, rgba(255,112,20,0) 74%);
      filter: blur(0.5px);
      animation: bullet-tail 180ms steps(2, end) infinite;
    }
    .impact-burst {
      z-index: 7;
      transform: translate(var(--x), var(--y));
      pointer-events: none;
    }
    .impact-burst::before {
      content: "";
      position: absolute;
      inset: 4px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,245,160,0.95) 0 16%, rgba(244,137,45,0.72) 17% 38%, transparent 62%);
      animation: impact-pop 520ms ease-out forwards;
    }
    .muzzle-flash {
      z-index: 8;
      position: absolute;
      left: var(--x);
      top: var(--y);
      width: 34px;
      height: 34px;
      margin: -17px 0 0 -17px;
      border-radius: 50%;
      transform: rotate(var(--rot));
      pointer-events: none;
      filter: drop-shadow(0 0 10px rgba(255, 213, 75, 0.9));
      animation: muzzle-flash 190ms ease-out forwards;
    }
    .muzzle-flash::before {
      content: "";
      position: absolute;
      inset: 4px;
      background:
        radial-gradient(circle at 38% 50%, #fff8c5 0 14%, #ffcf4c 15% 34%, rgba(255, 97, 24, 0.72) 35% 55%, transparent 70%);
      clip-path: polygon(0 44%, 52% 12%, 100% 50%, 52% 88%, 0 56%);
    }
    .skill-burst {
      z-index: 8;
      position: absolute;
      left: calc(var(--x) + 25px);
      top: calc(var(--y) + 25px);
      width: 42px;
      height: 42px;
      margin: -21px 0 0 -21px;
      border-radius: 50%;
      border: 3px solid var(--skill-color, #ffd84d);
      background: radial-gradient(circle, color-mix(in srgb, var(--skill-color, #ffd84d) 42%, transparent), transparent 66%);
      box-shadow: 0 0 18px var(--skill-color, #ffd84d);
      pointer-events: none;
      animation: skill-burst 760ms ease-out forwards;
    }
    .end-overlay {
      position: absolute;
      left: 50%;
      top: 50%;
      z-index: 9;
      display: none;
      width: min(320px, calc(100% - 80px));
      padding: 12px 14px;
      border: 1px solid rgba(255, 231, 151, 0.44);
      border-radius: 8px;
      background: rgba(8, 12, 9, 0.74);
      color: #fff8df;
      text-align: center;
      pointer-events: none;
      transform: translate(-50%, -50%);
      box-shadow: 0 10px 30px rgba(0,0,0,0.28);
      backdrop-filter: blur(2px);
    }
    .end-overlay.show {
      display: block;
    }
    .end-overlay strong {
      display: block;
      font-size: 16px;
      line-height: 1.2;
    }
    .end-overlay span {
      display: block;
      margin-top: 5px;
      color: #d9cfaa;
      font-size: 12px;
      line-height: 1.35;
    }
    @keyframes star-pulse {
      from { transform: scale(0.9) rotate(-8deg); }
      to { transform: scale(1.08) rotate(8deg); }
    }
    @keyframes aura-spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes bullet-tail {
      50% { opacity: 0.38; transform: translateY(2px); }
    }
    @keyframes impact-pop {
      from { opacity: 1; transform: scale(0.55); }
      to { opacity: 0; transform: scale(1.8); }
    }
    @keyframes muzzle-flash {
      from { opacity: 1; transform: rotate(var(--rot)) scale(0.5); }
      to { opacity: 0; transform: rotate(var(--rot)) scale(1.65); }
    }
    @keyframes skill-burst {
      from { opacity: 0.95; transform: scale(0.4); }
      to { opacity: 0; transform: scale(2.4); }
    }
    .loader, .controls {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 8px;
      padding: 10px;
      border-top: 1px solid var(--line);
      background: #15191e;
    }
    .controls {
      grid-template-columns: repeat(5, minmax(0, 1fr)) 96px;
    }
    input[type="file"], input[type="password"], input[type="url"], button, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel-2);
      color: var(--text);
      padding: 9px 10px;
      font: inherit;
    }
    input[type="range"] {
      width: 100%;
      margin: 0;
      accent-color: var(--left);
      background: #15191e;
      border-top: 1px solid var(--line);
      padding: 10px;
    }
    button {
      cursor: pointer;
      font-weight: 650;
    }
    aside {
      padding: 14px;
      display: grid;
      grid-template-rows: auto auto auto auto auto minmax(0, 1fr);
      gap: 12px;
      overflow: hidden;
    }
    h1 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0;
    }
    .history, .result, .frame, .tank {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
    }
    .history {
      display: grid;
      gap: 9px;
    }
    .history-head, .history-pager {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .history-title {
      font-weight: 700;
    }
    .history-status {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .history-key {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 82px;
      gap: 8px;
    }
    .history-pager {
      grid-template-columns: 1fr auto 1fr;
    }
    .history-pager button {
      min-width: 76px;
      padding: 7px 9px;
      font-size: 13px;
    }
    .history-page {
      color: var(--muted);
      font-size: 12px;
      text-align: center;
      white-space: nowrap;
    }
    .match-list {
      display: grid;
      gap: 7px;
      max-height: 42vh;
      overflow: auto;
      padding-right: 2px;
    }
    .match-item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 72px;
      gap: 8px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #151a20;
      padding: 8px;
    }
    .match-main {
      min-width: 0;
    }
    .match-versus {
      display: flex;
      gap: 5px;
      align-items: center;
      color: var(--text);
      font-size: 13px;
      font-weight: 700;
      line-height: 1.25;
    }
    .match-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .match-vs {
      color: var(--muted);
      flex: 0 0 auto;
      font-weight: 600;
    }
    .match-meta, .match-result {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }
    .match-result {
      color: var(--text);
    }
    .match-item button {
      padding: 7px 8px;
      font-size: 13px;
    }
    .match-item.is-loading {
      border-color: #d9b55d;
      background: #211f18;
    }
    .match-item.is-error {
      border-color: #8f4a45;
      background: #231918;
    }
    .match-empty {
      color: var(--muted);
      font-size: 13px;
      padding: 6px 0;
    }
    .frame {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
    }
    .result {
      overflow-wrap: anywhere;
      max-height: 96px;
      overflow: auto;
    }
    #tanks {
      min-height: 0;
    }
    .tank + .tank { margin-top: 10px; }
    .tank strong {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
      color: var(--text);
    }
    .tank dl {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 5px 10px;
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }
    .tank dd { margin: 0; color: var(--text); }
    .events {
      min-height: 0;
      overflow: auto;
      border-top: 1px solid var(--line);
      padding-top: 10px;
      font-size: 12px;
      color: var(--muted);
    }
    .events-title {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
      color: var(--text);
      font-weight: 700;
    }
    .event-list {
      display: grid;
      gap: 6px;
    }
    .event-row {
      display: grid;
      grid-template-columns: 48px 1fr;
      gap: 8px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #151a20;
    }
    .event-row.current {
      border-color: #526171;
      background: #1c232b;
    }
    .event-row.skill {
      border-color: #7a6630;
      background: #211f18;
    }
    .event-row.mound {
      border-color: #8c6a3d;
      background: #211c16;
    }
    .event-frame {
      color: var(--muted);
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
    }
    .event-main {
      color: var(--text);
      font-weight: 650;
    }
    .event-meta {
      margin-top: 3px;
      color: var(--muted);
      line-height: 1.35;
    }
    .event-empty {
      color: var(--muted);
      padding: 8px 0;
    }
    .left { color: var(--left); }
    .right { color: var(--right); }
    @media (max-width: 900px) {
      main { height: auto; grid-template-columns: 1fr; overflow: visible; }
      .stage, aside { height: auto; min-height: auto; }
      .loader, .controls { grid-template-columns: 1fr; }
      .match-list { max-height: none; }
    }
  </style>
</head>
<body>
<main>
  <section class="stage">
    <div id="battleStage" class="battle-stage" tabindex="0" aria-label="Replay battlefield">
      <div class="battle-empty">Load a replay to show the battlefield.</div>
    </div>
    <input id="timeline" type="range" min="0" max="0" value="0">
    <div class="loader">
      <input id="file" type="file" accept=".json,application/json">
      <input id="url" type="url" placeholder="https://agentank.ai/history/mat_... or mat_...">
      <button id="loadUrl" type="button">Load URL</button>
    </div>
    <div class="controls">
      <button id="back10" type="button">后退 10</button>
      <button id="prev" type="button">上一帧</button>
      <button id="play" type="button">播放</button>
      <button id="next" type="button">下一帧</button>
      <button id="forward10" type="button">前进 10</button>
      <select id="speed" aria-label="播放速度">
        <option value="600">0.5x</option>
        <option value="300" selected>1x</option>
        <option value="150">2x</option>
        <option value="75">4x</option>
      </select>
    </div>
  </section>
  <aside>
    <h1>AgenTank Official Replay</h1>
    <section class="history" aria-label="最近战斗">
      <div class="history-head">
        <span class="history-title">最近战斗</span>
        <span class="history-status" id="matchStatus">输入 tank key 后加载最近 50 场。</span>
      </div>
      <div class="history-key">
        <input id="tankKey" type="password" placeholder="tank key" autocomplete="off">
        <button id="loadMatches" type="button">刷新</button>
      </div>
      <div class="history-pager">
        <button id="prevMatches" type="button">上一页</button>
        <span class="history-page" id="matchPage">1-50</span>
        <button id="nextMatches" type="button">下一页</button>
      </div>
      <div class="match-list" id="matchList">
        <div class="match-empty">还没有加载战斗列表。</div>
      </div>
    </section>
    <div class="result" id="result">Load an official AgenTank match URL or match id to begin.</div>
    <div class="frame">
      <span id="frameLabel">Frame 0</span>
      <span id="eventCount">0 events</span>
    </div>
    <div id="tanks"></div>
    <div class="events" id="events"></div>
  </aside>
</main>
<script>
const DIRS = { up: [0, -1], right: [1, 0], down: [0, 1], left: [-1, 0] };
const TURN_ORDER = ["up", "right", "down", "left"];
const OFFICIAL_SKILL_DURATIONS = {
  shield: 4,
  freeze: 2,
  stun: 6,
  overload: 10,
  cloak: 8,
  poison: 4,
  boost: 6
};
const DEBUFF_SKILLS = new Set(["freeze", "stun", "poison"]);
const TILE = 50;
const battleStage = document.getElementById("battleStage");
const timeline = document.getElementById("timeline");
const playBtn = document.getElementById("play");
const speed = document.getElementById("speed");
const resultEl = document.getElementById("result");
const frameLabel = document.getElementById("frameLabel");
const eventCount = document.getElementById("eventCount");
const tanksEl = document.getElementById("tanks");
const eventsEl = document.getElementById("events");
const tankKeyInput = document.getElementById("tankKey");
const loadMatchesBtn = document.getElementById("loadMatches");
const prevMatchesBtn = document.getElementById("prevMatches");
const nextMatchesBtn = document.getElementById("nextMatches");
const matchPageEl = document.getElementById("matchPage");
const matchStatusEl = document.getElementById("matchStatus");
const matchListEl = document.getElementById("matchList");
const MATCH_PAGE_SIZE = 50;
let replayModel = null;
let frames = [];
let current = 0;
let timer = null;
let battleDom = null;
let matchOffset = 0;
let matchRows = [];
let matchHasMore = false;
let matchLoading = false;

function step(pos, dir) {
  const delta = DIRS[dir] || [0, 0];
  return [pos[0] + delta[0], pos[1] + delta[1]];
}

function oppositeDirection(direction) {
  if (direction === "up") return "down";
  if (direction === "down") return "up";
  if (direction === "left") return "right";
  if (direction === "right") return "left";
  return direction;
}

function directionFromDelta(from, to) {
  if (!from || !to) return "";
  const dx = to[0] - from[0];
  const dy = to[1] - from[1];
  if (Math.abs(dx) > Math.abs(dy)) return dx > 0 ? "right" : "left";
  if (dy !== 0) return dy > 0 ? "down" : "up";
  return "";
}

function officialTurnDirection(current, value, stunReversed) {
  let turn = value;
  if (stunReversed && (turn === "left" || turn === "right")) {
    turn = turn === "left" ? "right" : "left";
  }
  if (turn === "left" || turn === "right") {
    const index = TURN_ORDER.indexOf(current);
    const delta = turn === "right" ? 1 : -1;
    return TURN_ORDER[(index + delta + TURN_ORDER.length) % TURN_ORDER.length];
  }
  return TURN_ORDER.includes(turn) ? turn : current;
}

function isTile(value) {
  return value === "x" || value === "m" || value === "o" || value === ".";
}

function isRows(value) {
  return Array.isArray(value)
    && value.length > 0
    && value.every(function (row) { return typeof row === "string" && row.length > 0 && Array.from(row).every(isTile); });
}

function isRuntimeMap(value) {
  return Array.isArray(value)
    && value.length > 0
    && value.every(function (col) { return Array.isArray(col) && col.length > 0 && col.every(isTile); });
}

function runtimeMapToRows(map) {
  const height = Math.max.apply(null, map.map(function (col) { return col.length; }));
  const rows = [];
  for (let y = 0; y < height; y += 1) {
    let row = "";
    for (let x = 0; x < map.length; x += 1) row += map[x][y] || "x";
    rows.push(row);
  }
  return rows;
}

function normalizeMapRows(value) {
  if (isRows(value)) return value.slice();
  if (isRuntimeMap(value)) return runtimeMapToRows(value);
  if (value && Array.isArray(value.rows)) return normalizeMapRows(value.rows);
  if (value && Array.isArray(value.mapRows)) return normalizeMapRows(value.mapRows);
  if (value && Array.isArray(value.map)) return normalizeMapRows(value.map);
  if (value && Array.isArray(value.tiles)) return normalizeMapRows(value.tiles);
  return null;
}

function playerName(raw, index) {
  return (raw.replayData && raw.replayData.names && raw.replayData.names[index])
    || (index === 0 ? raw.participants?.challenger?.tankName : raw.participants?.defender?.tankName)
    || "tank-" + index;
}

function inferSkill(records, objectIdToIndex, index) {
  for (const frameEvents of records) {
    for (const event of frameEvents || []) {
      if (event.type !== "skill" || !event.skillType) continue;
      const skillIndex = typeof event.by === "number" ? event.by : objectIdToIndex.get(event.sourceObjectId);
      if (skillIndex === index) return event.skillType;
    }
  }
  return "unknown";
}

function emptySkillStats() {
  return { cast: 0, applied: 0, expired: 0 };
}

function buildReplayModel(raw) {
  const data = raw.replayData || raw;
  const records = data.replay && data.replay.records;
  if (!Array.isArray(records)) {
    if (raw.links?.raw || raw.rawReplayUrl) {
      throw new Error("This is a summary JSON. Use the raw replay URL or download agent.json?view=raw.");
    }
    throw new Error("Official replay JSON must contain replayData.replay.records.");
  }

  const rows = normalizeMapRows(data.map?.map || data.map || raw.map);
  if (!rows) throw new Error("Official replay JSON does not include a readable map.");

  const players = data.replay?.meta?.players || [];
  const mapPlayers = data.map?.players || [];
  const names = [playerName(raw, 0), playerName(raw, 1)];
  const objectIdToIndex = new Map();
  players.forEach(function (player, index) {
    if (player?.tank?.id) objectIdToIndex.set(player.tank.id, index);
  });
  const tanks = names.map(function (name, index) {
    const player = players[index] || {};
    const mapPlayer = mapPlayers[index] || {};
    return {
      name,
      objectId: player.tank?.id || "",
      skill: inferSkill(records, objectIdToIndex, index),
      position: (player.tank?.position || mapPlayer.position || [index === 0 ? 2 : Math.max(1, rows[0].length - 3), index === 0 ? 2 : Math.max(1, rows.length - 3)]).slice(),
      direction: player.tank?.direction || mapPlayer.direction || (index === 0 ? "right" : "left"),
      stars: 0,
      crashed: false,
      reason: "",
      activeSkills: {},
      skillPulse: null,
      lastSkill: "",
      skillStats: emptySkillStats()
    };
  });

  const result = raw.summary?.result || data.replay?.meta?.result || {};
  return {
    rows,
    records,
    names,
    tanks,
    objectIdToIndex,
    mapId: data.map?.id || raw.match?.mapId || "official",
    mapName: data.map?.name || raw.match?.mapName || "",
    source: raw.match?.urlId || "",
    result: {
      winner: typeof result.winner === "number" ? names[result.winner] : (result.winner || raw.match?.winnerTankName || "draw"),
      reason: result.reason || raw.match?.resultReason || "unknown"
    }
  };
}

function tankByObject(state, id) {
  const index = replayModel.objectIdToIndex.get(id);
  return typeof index === "number" ? state.tanks[index] : null;
}

function tankByIndex(state, index) {
  return typeof index === "number" ? state.tanks[index] : null;
}

function tankByName(state, name) {
  return state.tanks.find(function (tank) { return tank.name === name; }) || null;
}

function tankByPosition(state, position) {
  const point = normalizePoint(position);
  if (!point) return null;
  return state.tanks.find(function (tank) {
    return tank.position[0] === point[0] && tank.position[1] === point[1];
  }) || null;
}

function bulletImpactTank(state, event) {
  return tankByObject(state, event.targetObjectId)
    || tankByObject(state, event.hitObjectId)
    || tankByObject(state, event.victimObjectId)
    || tankByObject(state, event.blockedByObjectId)
    || tankByObject(state, event.target?.id)
    || tankByObject(state, event.hitTank?.id)
    || tankByObject(state, event.victim?.id)
    || tankByPosition(state, eventPoint(event));
}

function breakShieldOnBulletImpact(state, event, frame) {
  if (event.action !== "blocked" && event.action !== "hit") return;
  const target = bulletImpactTank(state, event);
  if (!target?.activeSkills?.shield) return;
  delete target.activeSkills.shield;
  target.skillPulse = { skill: "shield", action: "expired" };
  target.lastSkill = "blocked bullet @ " + frame;
}

function enemyOfTank(state, tank) {
  if (!tank) return null;
  return state.tanks.find(function (candidate) { return candidate !== tank; }) || null;
}

function skillDurationFrames(skill, event) {
  const explicit = Number(event.durationFrames);
  if (Number.isFinite(explicit) && explicit > 0) return Math.round(explicit);
  return OFFICIAL_SKILL_DURATIONS[skill] || null;
}

function tankForSkillEvent(state, event, target, skill) {
  const actor = tankByObject(state, event.sourceObjectId) || tankByIndex(state, event.by);
  if (target && event.targetObjectId) return tankByObject(state, event.targetObjectId);
  if (target && DEBUFF_SKILLS.has(skill)) return enemyOfTank(state, actor);
  if (target) return actor;
  return tankByObject(state, event.sourceObjectId) || tankByIndex(state, event.by);
}

function skillNameForEvent(event) {
  return event.skillType || event.skill || "skill";
}

function applySkillEvent(state, event, frame) {
  const skill = skillNameForEvent(event);
  const actor = tankForSkillEvent(state, event, false, skill);
  const target = tankForSkillEvent(state, event, true, skill) || actor;
  const action = event.action || "skill";
  if (actor) {
    actor.skillStats = actor.skillStats || emptySkillStats();
    if (Object.prototype.hasOwnProperty.call(actor.skillStats, action)) actor.skillStats[action] += 1;
    actor.lastSkill = action + " " + skill + " @ " + frame;
    actor.skillPulse = { skill, action };
  }
  if (target) {
    target.activeSkills = target.activeSkills || {};
    target.skillPulse = { skill, action };
    target.lastSkill = action + " " + skill + " @ " + frame;
    if (action === "applied") {
      const durationFrames = skillDurationFrames(skill, event);
      target.activeSkills[skill] = {
        skill,
        source: actor?.name || "",
        durationFrames,
        remainingFrames: durationFrames,
        untilFrame: durationFrames ? frame + durationFrames : null
      };
    }
    if (action === "expired") delete target.activeSkills[skill];
  }
}

function updateActiveSkills(state, frame) {
  state.tanks.forEach(function (tank) {
    tank.skillPulse = null;
    Object.keys(tank.activeSkills || {}).forEach(function (skill) {
      const effect = tank.activeSkills[skill];
      if (effect.untilFrame !== null && effect.untilFrame !== undefined) {
        effect.remainingFrames = Math.max(0, effect.untilFrame - frame);
        if (effect.remainingFrames <= 0) delete tank.activeSkills[skill];
      }
    });
  });
}

function applyOfficialEvent(state, event, frame) {
  if (event.type === "star") {
    if (event.action === "created") state.star = (event.position || event.at || []).slice();
    if (event.action === "collected") {
      const tank = tankByIndex(state, event.by);
      if (tank) tank.stars += 1;
      state.star = null;
    }
    return;
  }

  if (event.type === "tank") {
    const tank = tankByObject(state, event.objectId) || tankByIndex(state, event.index);
    if (!tank) return;
    if (event.action === "turn") tank.direction = officialTurnDirection(tank.direction, event.direction, event.stunReversed);
    if (event.action === "go") {
      const moveDirection = directionFromDelta(tank.position, event.position);
      if (moveDirection) tank.direction = event.reverse ? oppositeDirection(moveDirection) : moveDirection;
      tank.position = event.position.slice();
    }
    if (event.action === "teleport") tank.position = event.position.slice();
    if (event.action === "crashed") {
      tank.crashed = true;
      tank.reason = event.reason || "crashed";
    }
    return;
  }

  if (event.type === "bullet") {
    const shooter = tankByObject(state, event.tank?.id) || tankByIndex(state, event.by);
    const direction = event.direction || event.tank?.direction || shooter?.direction || "right";
    const existingBullet = function () {
      return state.bullets.find(function (item) { return item.id === event.objectId; }) || null;
    };
    if (event.action === "created") {
      const tankPosition = clonePoint(event.tank?.position);
      const position = eventPoint(event) || (tankPosition ? step(tankPosition, direction) : shooter ? step(shooter.position, direction) : [0, 0]);
      state.bullets.push({ id: event.objectId, tank: shooter?.name || "", position: position.slice(), direction });
      return;
    }
    if (event.action === "go") {
      let bullet = existingBullet();
      const position = eventPoint(event) || (bullet ? twoStep(bullet.position, direction) : null);
      if (!position) return;
      if (!bullet) {
        bullet = { id: event.objectId, tank: shooter?.name || "", position: position.slice(), direction };
        state.bullets.push(bullet);
      }
      bullet.position = position.slice();
      bullet.direction = direction;
      return;
    }
    if (event.action === "mound") {
      const bullet = existingBullet();
      const moundPosition = eventPoint(event) || (bullet ? step(bullet.position, direction) : null);
      if (setMapTile(state, moundPosition, ".")) {
        state.impacts.push({ type: "mound", position: moundPosition.slice() });
      }
    }
    if (event.action === "crashed" || event.action === "hit" || event.action === "blocked" || event.action === "mound") {
      breakShieldOnBulletImpact(state, event, frame);
      const index = state.bullets.findIndex(function (item) { return item.id === event.objectId; });
      if (index >= 0) state.bullets.splice(index, 1);
    }
    return;
  }

  if (event.type === "map" && event.action === "destroyed") {
    const point = eventPoint(event);
    if (setMapTile(state, point, ".")) {
      state.impacts.push({ type: "mound", position: point.slice() });
    }
    return;
  }

  if (event.type === "skill") {
    applySkillEvent(state, event, frame);
  }
}

function buildFrames() {
  const state = {
    map: replayModel.rows.map(function (row) { return row.split(""); }),
    star: null,
    impacts: [],
    bullets: [],
    tanks: replayModel.tanks.map(function (tank) { return JSON.parse(JSON.stringify(tank)); })
  };
  const result = [];
  for (let frame = 0; frame < replayModel.records.length; frame += 1) {
    const events = replayModel.records[frame] || [];
    state.impacts = [];
    updateActiveSkills(state, frame);
    events.forEach(function (event) { applyOfficialEvent(state, event, frame); });
    result.push(JSON.parse(JSON.stringify({ frame, events, state })));
  }
  return result;
}

async function loadOfficialPayload(payload) {
  replayModel = buildReplayModel(payload);
  frames = buildFrames();
  current = 0;
  battleDom = null;
  timeline.max = String(Math.max(0, frames.length - 1));
  timeline.value = "0";
  resultEl.textContent = "Winner: " + replayModel.result.winner + " / Reason: " + replayModel.result.reason + " / Map: " + replayModel.mapId;
  draw();
}

async function loadText(text) {
  const payload = JSON.parse(String(text).replace(/^\uFEFF/, ""));
  await loadOfficialPayload(payload);
}

async function parseJsonResponse(response, source) {
  if (!response.ok) throw new Error(response.status + " " + response.statusText + ": " + source);
  return JSON.parse((await response.text()).replace(/^\uFEFF/, ""));
}

function canUseOfficialProxy(source) {
  if (!/^https?:$/.test(location.protocol)) return false;
  try {
    const url = new URL(source);
    return url.hostname === "agentank.ai" && url.pathname.startsWith("/api/matches/");
  } catch {
    return false;
  }
}

function matchIdFromSource(source) {
  const found = String(source || "").match(/\bmat_[A-Za-z0-9]+\b/);
  return found ? found[0] : "";
}

function officialAgentJsonUrl(matchId) {
  return "https://agentank.ai/api/matches/" + matchId + "/agent.json";
}

function normalizeOfficialUrl(source) {
  const text = String(source || "").trim();
  const matchId = matchIdFromSource(text);
  try {
    const url = new URL(text);
    if (url.hostname === "agentank.ai") {
      url.protocol = "https:";
      if (matchId && !url.pathname.startsWith("/api/matches/")) return officialAgentJsonUrl(matchId);
      return url.toString();
    }
  } catch {
    if (matchId) return officialAgentJsonUrl(matchId);
    return text;
  }
  if (matchId) return officialAgentJsonUrl(matchId);
  return text;
}

async function fetchOfficialJson(source) {
  const normalizedSource = normalizeOfficialUrl(source);
  const attempts = [normalizedSource];
  if (canUseOfficialProxy(normalizedSource)) attempts.push("/official-replay-proxy?url=" + encodeURIComponent(normalizedSource));
  let lastError = null;
  for (const target of attempts) {
    try {
      return await parseJsonResponse(await fetch(target, { headers: { accept: "application/json" } }), normalizedSource);
    } catch (error) {
      lastError = error;
    }
  }
  if (location.protocol === "file:" && /^https?:\/\//i.test(normalizedSource)) {
    throw new Error("Browser blocked URL fetch by CORS. Run node serve-official-replay-loader.mjs and open http://127.0.0.1:5177/");
  }
  throw lastError || new Error("Fetch failed: " + normalizedSource);
}

function directionAngle(direction) {
  if (direction === "right") return 0;
  if (direction === "down") return Math.PI / 2;
  if (direction === "left") return Math.PI;
  return -Math.PI / 2;
}

function escapeHtml(value) {
  return String(value ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function normalizeTankBearer(value) {
  const text = String(value || "").trim();
  if (!text) return "";
  return /^Bearer\s+/i.test(text) ? text : "Bearer " + text;
}

function normalizeMatchPayload(payload) {
  if (Array.isArray(payload)) return { rows: payload, hasMore: payload.length === MATCH_PAGE_SIZE };
  const rows = payload?.matches || payload?.items || payload?.results || payload?.data || [];
  const fallbackHasMore = Array.isArray(rows) && rows.length === MATCH_PAGE_SIZE;
  return {
    rows: Array.isArray(rows) ? rows : [],
    hasMore: parseHasMore(payload?.hasMore, fallbackHasMore)
  };
}

function pickFirst(values, fallback) {
  for (const value of values) {
    if (value !== null && value !== undefined && String(value).trim()) return value;
  }
  return fallback;
}

function parseHasMore(value, fallback) {
  if (typeof value === "boolean") return value;
  if (typeof value === "string") return value.toLowerCase() === "true";
  return fallback;
}

function matchPlayers(match) {
  const challenger = pickFirst([
    match?.participants?.challenger?.tankName,
    match?.challengerTankName,
    match?.challenger?.tankName,
    match?.challenger?.name,
    match?.match?.challengerTankName,
    match?.match?.participants?.challenger?.tankName
  ], "Challenger");
  const defender = pickFirst([
    match?.participants?.defender?.tankName,
    match?.defenderTankName,
    match?.defender?.tankName,
    match?.defender?.name,
    match?.match?.defenderTankName,
    match?.match?.participants?.defender?.tankName
  ], "Defender");
  return [String(challenger), String(defender)];
}

function matchWinnerName(match, players) {
  const winner = pickFirst([
    match?.winnerTankName,
    match?.result?.winnerTankName,
    match?.summary?.winnerTankName,
    match?.summary?.result?.winner,
    match?.match?.winnerTankName,
    match?.match?.result?.winner
  ], "");
  if (typeof winner === "number") return players[winner] || "";
  if (/^\d+$/.test(String(winner))) return players[Number(winner)] || "";
  return String(winner || "");
}

function matchReason(match) {
  return String(pickFirst([
    match?.reason,
    match?.resultReason,
    match?.result?.reason,
    match?.summary?.reason,
    match?.summary?.result?.reason,
    match?.match?.resultReason,
    match?.match?.result?.reason
  ], "unknown"));
}

function matchOutcome(match, players) {
  const explicit = pickFirst([
    match?.outcome,
    match?.agentOutcome,
    match?.result?.outcome,
    match?.summary?.outcome
  ], "");
  if (explicit) {
    const value = String(explicit).toLowerCase();
    if (value.includes("win")) return "胜利";
    if (value.includes("loss") || value.includes("lose")) return "失败";
    if (value.includes("draw")) return "平局";
    return String(explicit);
  }
  const winner = matchWinnerName(match, players);
  return winner && winner !== "draw" ? "胜者 " + winner : "平局或未决";
}

function matchTime(match) {
  const raw = pickFirst([
    match?.createdAt,
    match?.finishedAt,
    match?.startedAt,
    match?.updatedAt,
    match?.match?.createdAt,
    match?.match?.finishedAt
  ], "");
  if (!raw) return "时间未知";
  const value = typeof raw === "number" && raw > 0 && raw < 1000000000000 ? raw * 1000 : raw;
  const date = new Date(value);
  if (Number.isNaN(date.getTime())) return String(raw);
  return date.toLocaleString();
}

function matchReplaySource(match) {
  const source = pickFirst([
    match?.links?.agentJson,
    match?.links?.raw,
    match?.agentJsonUrl,
    match?.rawReplayUrl,
    match?.replayUrl,
    match?.url,
    match?.match?.url,
    match?.match?.humanUrl,
    match?.historyUrl,
    match?.matchUrlId,
    match?.urlId,
    match?.id
  ], "");
  const matchId = matchIdFromSource(source);
  return matchId || source;
}

function hasInlineReplay(match) {
  return Boolean(match?.replayData?.replay?.records || match?.match?.replayData?.replay?.records);
}

function renderMatchList() {
  matchPageEl.textContent = (matchOffset + 1) + "-" + (matchOffset + MATCH_PAGE_SIZE);
  prevMatchesBtn.disabled = matchLoading || matchOffset === 0;
  nextMatchesBtn.disabled = matchLoading || !matchHasMore;
  loadMatchesBtn.disabled = matchLoading;

  if (matchLoading) {
    matchListEl.innerHTML = '<div class="match-empty">正在加载...</div>';
    return;
  }
  if (!matchRows.length) {
    matchListEl.innerHTML = '<div class="match-empty">这一页没有战斗记录。</div>';
    return;
  }

  matchListEl.innerHTML = matchRows.map(function (match, index) {
    const players = matchPlayers(match);
    const result = matchOutcome(match, players);
    const reason = matchReason(match);
    return '<article class="match-item">' +
      '<div class="match-main">' +
      '<div class="match-versus"><span class="match-name left">' + escapeHtml(players[0]) + '</span><span class="match-vs">vs</span><span class="match-name right">' + escapeHtml(players[1]) + '</span></div>' +
      '<div class="match-meta">' + escapeHtml(matchTime(match)) + '</div>' +
      '<div class="match-result">' + escapeHtml(result) + ' / ' + escapeHtml(reason) + '</div>' +
      '</div>' +
      '<button class="replay-match" type="button" data-index="' + index + '">回放</button>' +
      '</article>';
  }).join("");
}

async function loadMatchPage(offset) {
  const authorization = normalizeTankBearer(tankKeyInput.value);
  if (!authorization) {
    matchStatusEl.textContent = "请先输入 tank key。";
    return;
  }
  matchLoading = true;
  matchOffset = Math.max(0, offset);
  matchStatusEl.textContent = "正在读取最近战斗...";
  renderMatchList();
  try {
    const response = await fetch("/agent-tank-matches?limit=" + MATCH_PAGE_SIZE + "&offset=" + matchOffset, {
      headers: {
        accept: "application/json",
        authorization
      }
    });
    const text = await response.text();
    if (!response.ok) throw new Error(response.status + " " + response.statusText + ": " + text);
    const payload = JSON.parse(text.replace(/^\uFEFF/, ""));
    const normalized = normalizeMatchPayload(payload);
    matchRows = normalized.rows;
    matchHasMore = normalized.hasMore;
    matchStatusEl.textContent = "已加载 " + matchRows.length + " 场。";
  } catch (error) {
    matchRows = [];
    matchHasMore = false;
    matchStatusEl.textContent = "加载失败: " + (error.message || error);
  } finally {
    matchLoading = false;
    renderMatchList();
  }
}

async function replayMatch(match, button) {
  if (!match) return;
  const item = button?.closest(".match-item") || null;
  const originalLabel = button?.textContent || "回放";
  if (button) {
    button.disabled = true;
    button.textContent = "加载中";
  }
  if (item) {
    item.classList.remove("is-error");
    item.classList.add("is-loading");
  }
  matchStatusEl.textContent = "正在加载回放...";
  let loaded = false;
  try {
    if (hasInlineReplay(match)) {
      try {
        await loadOfficialPayload(match.replayData?.replay?.records ? match : match.match);
        loaded = true;
      } catch (error) {
        resultEl.textContent = "Inline replay failed, trying public match JSON: " + (error.message || error);
      }
    }
    if (!loaded) {
      const source = matchReplaySource(match);
      if (!source) {
        matchStatusEl.textContent = "这条记录没有可用的回放链接。";
        return;
      }
      document.getElementById("url").value = source;
      loaded = await loadUrlSource(source);
    }
    matchStatusEl.textContent = loaded ? "已加载回放。" : "回放加载失败，详情见结果栏。";
  } finally {
    if (button) {
      button.disabled = false;
      button.textContent = originalLabel;
    }
    if (item) {
      item.classList.remove("is-loading");
      item.classList.toggle("is-error", !loaded);
    }
  }
}

function formatPoint(value) {
  return Array.isArray(value) ? "[" + value.join(", ") + "]" : "";
}

function clonePoint(value) {
  const point = normalizePoint(value);
  return point ? point.slice() : null;
}

function normalizePoint(value) {
  if (Array.isArray(value) && value.length >= 2) {
    const point = [Number(value[0]), Number(value[1])];
    return point.every(Number.isFinite) ? point.map(Math.round) : null;
  }
  if (value && typeof value === "object" && Number.isFinite(Number(value.x)) && Number.isFinite(Number(value.y))) {
    return [Math.round(Number(value.x)), Math.round(Number(value.y))];
  }
  return null;
}

function eventPoint(event) {
  return normalizePoint(event.position)
    || normalizePoint(event.moundPosition)
    || normalizePoint(event.targetPosition)
    || normalizePoint(event.hitPosition)
    || normalizePoint(event.tilePosition)
    || normalizePoint(event.at);
}

function twoStep(pos, dir) {
  return step(step(pos, dir), dir);
}

function setMapTile(state, position, value) {
  const point = normalizePoint(position);
  if (!point) return false;
  const row = state.map[point[1]];
  if (!row || point[0] < 0 || point[0] >= row.length) return false;
  row[point[0]] = value;
  return true;
}

function skillColor(skill) {
  const colors = {
    boost: "#67e8f9",
    cloak: "#a78bfa",
    freeze: "#93c5fd",
    poison: "#86efac",
    shield: "#fde68a",
    stun: "#fca5a5",
    overload: "#f9a8d4"
  };
  return colors[skill] || "#ffd84d";
}

function activeSkillNames(tank) {
  return Object.keys(tank.activeSkills || {});
}

function displaySkill(skill) {
  return skill || "skill";
}

function tankSkillStatus(tank) {
  const active = activeSkillNames(tank);
  if (tank.skillPulse?.skill) return displaySkill(tank.skillPulse.skill);
  if (active.length) {
    return active.map(function (skill) {
      const effect = tank.activeSkills[skill];
      return displaySkill(skill) + (effect?.remainingFrames ? " " + effect.remainingFrames + "f" : "");
    }).join(", ");
  }
  return tank.skill && tank.skill !== "unknown" ? displaySkill(tank.skill) : "";
}

function drawTank(tank, index, tile, ox, oy) {
  const x = ox + (tank.position[0] + 0.5) * tile;
  const y = oy + (tank.position[1] + 0.5) * tile;
  const activeSkills = activeSkillNames(tank);
  if (activeSkills.length) {
    ctx.save();
    activeSkills.forEach(function (skill, skillIndex) {
      ctx.strokeStyle = skillColor(skill);
      ctx.globalAlpha = 0.72;
      ctx.lineWidth = Math.max(2, tile * 0.055);
      ctx.setLineDash([Math.max(4, tile * 0.16), Math.max(3, tile * 0.1)]);
      ctx.beginPath();
      ctx.arc(x, y, tile * (0.46 + skillIndex * 0.08), 0, Math.PI * 2);
      ctx.stroke();
    });
    ctx.restore();
  }
  if (tank.skillPulse) {
    ctx.save();
    ctx.strokeStyle = skillColor(tank.skillPulse.skill);
    ctx.fillStyle = skillColor(tank.skillPulse.skill);
    ctx.globalAlpha = tank.skillPulse.action === "expired" ? 0.25 : 0.38;
    ctx.beginPath();
    ctx.arc(x, y, tile * 0.68, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.95;
    ctx.lineWidth = Math.max(2, tile * 0.07);
    ctx.setLineDash([]);
    ctx.beginPath();
    ctx.arc(x, y, tile * 0.72, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(directionAngle(tank.direction));
  ctx.fillStyle = index === 0 ? "#39a7ff" : "#ff6b6b";
  ctx.strokeStyle = tank.crashed ? "#ffffff" : "#0b1015";
  ctx.lineWidth = Math.max(2, tile * 0.05);
  ctx.globalAlpha = tank.crashed ? 0.45 : activeSkills.includes("cloak") ? 0.58 : 1;
  ctx.fillRect(-tile * 0.34, -tile * 0.28, tile * 0.68, tile * 0.56);
  ctx.strokeRect(-tile * 0.34, -tile * 0.28, tile * 0.68, tile * 0.56);
  ctx.fillStyle = "#edf6ff";
  ctx.fillRect(tile * 0.1, -tile * 0.07, tile * 0.36, tile * 0.14);
  ctx.restore();
  if (tank.skillPulse || activeSkills.length) {
    const label = tank.skillPulse ? displaySkill(tank.skillPulse.skill) : activeSkills.map(displaySkill).join(",");
    ctx.save();
    ctx.font = "700 " + Math.max(10, Math.floor(tile * 0.2)) + "px ui-sans-serif, system-ui, sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillStyle = tank.skillPulse ? skillColor(tank.skillPulse.skill) : skillColor(activeSkills[0]);
    ctx.strokeStyle = "#0d0f12";
    ctx.lineWidth = Math.max(2, tile * 0.04);
    ctx.strokeText(label, x, y - tile * 0.65);
    ctx.fillText(label, x, y - tile * 0.65);
    ctx.restore();
  }
}

function eventTankName(event, state) {
  if (typeof event.tank === "string") return event.tank;
  if (event.type === "skill") {
    return tankForSkillEvent(state, event, false, skillNameForEvent(event))?.name || "";
  }
  if (event.type === "bullet") {
    return tankByObject(state, event.tank?.id)?.name || tankByIndex(state, event.by)?.name || "";
  }
  if (event.type === "tank") {
    return tankByObject(state, event.objectId)?.name || tankByIndex(state, event.index)?.name || "";
  }
  if (event.type === "star" && typeof event.by === "number") return tankByIndex(state, event.by)?.name || "";
  return "";
}

function eventTargetName(event, state) {
  if (event.targetObjectId) return tankByObject(state, event.targetObjectId)?.name || "";
  if (event.type === "skill" && DEBUFF_SKILLS.has(skillNameForEvent(event))) {
    return tankForSkillEvent(state, event, true, skillNameForEvent(event))?.name || "";
  }
  return "";
}

function eventTitle(event, state) {
  const tank = eventTankName(event, state);
  const actor = tank ? tank + " - " : "";
  if (event.type === "skill") return actor + "Skill " + (event.action || "") + " " + displaySkill(skillNameForEvent(event));
  if (event.type === "tank" && event.action === "go") return actor + "Move";
  if (event.type === "tank" && event.action === "turn") return actor + "Turn";
  if (event.type === "tank" && event.action === "teleport") return actor + "Teleport";
  if (event.type === "tank" && event.action === "crashed") return actor + "Crashed";
  if (event.type === "bullet" && event.action === "created") return actor + "Fire";
  if (event.type === "bullet" && event.action === "mound") return actor + "Mound destroyed";
  if (event.type === "bullet") return actor + "Bullet " + (event.action || "");
  if (event.type === "map" && event.action === "destroyed") return "Mound destroyed";
  if (event.type === "star" && event.action === "created") return "Star created";
  if (event.type === "star" && event.action === "collected") return actor + "Star collected";
  if (event.type === "speech") return actor + "Speech";
  return actor + event.type + " " + (event.action || "");
}

function eventMeta(event, state) {
  const parts = [];
  if (event.direction) parts.push("dir " + event.direction);
  const bullet = event.type === "bullet" && event.objectId
    ? state.bullets.find(function (item) { return item.id === event.objectId; })
    : null;
  let point = eventPoint(event);
  if (!point && event.type === "bullet" && event.action === "created") {
    const tankPosition = clonePoint(event.tank?.position);
    const direction = event.direction || event.tank?.direction || "right";
    point = tankPosition ? step(tankPosition, direction) : null;
  }
  point = point || bullet?.position;
  if (point) parts.push("pos " + formatPoint(point));
  if (event.type === "skill" && event.action === "applied") {
    const durationFrames = skillDurationFrames(skillNameForEvent(event), event);
    if (durationFrames) parts.push("duration " + durationFrames + "f");
  } else if (event.durationFrames) {
    parts.push("duration " + event.durationFrames + "f");
  }
  if (event.reverse) parts.push("reverse");
  if (event.reason) parts.push("reason " + event.reason);
  const target = eventTargetName(event, state);
  if (target) parts.push("target " + target);
  if (event.objectId) parts.push("id " + String(event.objectId).slice(0, 8));
  if (event.text) parts.push(event.text);
  return parts.join(" - ");
}

function recentBehaviorRows(limit) {
  const rows = [];
  for (let frameIndex = current; frameIndex >= 0 && rows.length < limit; frameIndex -= 1) {
    const frame = frames[frameIndex];
    const frameEvents = frame?.events || [];
    for (let index = frameEvents.length - 1; index >= 0 && rows.length < limit; index -= 1) {
      rows.push({ frameIndex, event: frameEvents[index], state: frame.state });
    }
  }
  return rows;
}

function renderBehaviorList() {
  const rows = recentBehaviorRows(20);
  if (!rows.length) {
    return '<div class="events-title"><span>Behavior Data</span><span>0</span></div><div class="event-empty">No behavior events yet.</div>';
  }
  return '<div class="events-title"><span>Behavior Data</span><span>recent ' + rows.length + '</span></div>' +
    '<div class="event-list">' + rows.map(function (row) {
      const kind = row.event.type === "skill" ? " skill" : row.event.type === "bullet" && row.event.action === "mound" ? " mound" : "";
      const currentClass = row.frameIndex === current ? " current" : "";
      return '<div class="event-row' + kind + currentClass + '">' +
        '<div class="event-frame">#' + row.frameIndex + '</div>' +
        '<div><div class="event-main">' + escapeHtml(eventTitle(row.event, row.state)) + '</div>' +
        '<div class="event-meta">' + escapeHtml(eventMeta(row.event, row.state) || "-") + '</div></div>' +
        '</div>';
    }).join("") + '</div>';
}

function tileClass(value) {
  if (value === "x") return "stone";
  if (value === "m") return "dirt";
  if (value === "o") return "grass";
  return "floor";
}

function mapKey(rows) {
  return rows.map(function (row) { return Array.isArray(row) ? row.join("") : String(row); }).join("\n");
}

function mapSizeKey(rows) {
  return String(rows[0]?.length || 0) + "x" + String(rows.length || 0);
}

function directionDegrees(direction) {
  if (direction === "right") return 0;
  if (direction === "down") return 90;
  if (direction === "left") return 180;
  return -90;
}

function setSpritePosition(node, position, direction) {
  node.style.setProperty("--x", (position[0] * TILE) + "px");
  node.style.setProperty("--y", (position[1] * TILE) + "px");
  node.style.setProperty("--rot", directionDegrees(direction || "right") + "deg");
}

function fitBattlefield() {
  if (!battleDom?.board) return;
  battleDom.board.style.transform = "";
  const stageWidth = Math.max(1, battleStage.clientWidth - 28);
  const stageHeight = Math.max(1, battleStage.clientHeight - 28);
  const boardWidth = battleDom.board.offsetWidth || 1;
  const boardHeight = battleDom.board.offsetHeight || 1;
  const scale = Math.min(1, stageWidth / boardWidth, stageHeight / boardHeight);
  battleDom.board.style.transform = "scale(" + scale + ")";
}

function createBattlefield(rows) {
  const height = rows.length;
  const width = rows[0]?.length || 0;
  battleStage.innerHTML = "";
  const board = document.createElement("div");
  board.className = "playground";
  board.style.width = (width * TILE) + "px";
  board.style.height = (height * TILE) + "px";
  board.style.setProperty("--frame-ms", Math.max(48, Number(speed.value) - 28) + "ms");
  const tiles = [];
  for (let y = 0; y < height; y += 1) {
    tiles[y] = [];
    for (let x = 0; x < width; x += 1) {
      const node = document.createElement("div");
      node.className = "tile " + tileClass(rows[y][x]);
      node.style.transform = "translate(" + (x * TILE) + "px," + (y * TILE) + "px)";
      board.appendChild(node);
      tiles[y][x] = node;
    }
  }
  battleStage.appendChild(board);
  battleDom = {
    board,
    mapKey: mapSizeKey(rows),
    tiles: [],
    tanks: [],
    bulletsById: new Map(),
    star: null,
    endOverlay: null
  };
  battleDom.tiles = tiles;
  requestAnimationFrame(fitBattlefield);
  return battleDom;
}

function updateBattlefieldTiles(dom, rows) {
  for (let y = 0; y < rows.length; y += 1) {
    for (let x = 0; x < (rows[y]?.length || 0); x += 1) {
      const tile = dom.tiles[y]?.[x];
      if (tile) tile.className = "tile " + tileClass(rows[y][x]);
    }
  }
}

function ensureBattlefield(rows) {
  if (!battleDom || battleDom.mapKey !== mapSizeKey(rows)) return createBattlefield(rows);
  battleDom.board.style.setProperty("--frame-ms", Math.max(48, Number(speed.value) - 28) + "ms");
  updateBattlefieldTiles(battleDom, rows);
  return battleDom;
}

function ensureTankSprite(dom, index) {
  if (dom.tanks[index]) return dom.tanks[index];
  const node = document.createElement("div");
  node.className = "tank-sprite tank-" + (index + 1);
  node.innerHTML = '<div class="tank-machine"><div class="tank-aura"></div><div class="tank-track top"></div><div class="tank-track bottom"></div><div class="tank-body"></div><div class="tank-cannon"></div></div><div class="tank-hud"><span class="tank-name"></span><span class="tank-skill"></span></div>';
  const colors = index === 0
    ? { color: "#2f95dd", hi: "#68d3ff" }
    : { color: "#d64d3e", hi: "#ff936b" };
  node.style.setProperty("--tank-color", colors.color);
  node.style.setProperty("--tank-hi", colors.hi);
  dom.board.appendChild(node);
  dom.tanks[index] = node;
  return node;
}

function renderTankSprites(dom, state) {
  state.tanks.forEach(function (tank, index) {
    const node = ensureTankSprite(dom, index);
    const activeSkills = activeSkillNames(tank);
    const pulseSkill = tank.skillPulse?.skill || "";
    const skill = pulseSkill || activeSkills[0] || "";
    node.classList.toggle("crashed", !!tank.crashed);
    node.classList.toggle("cloaked", activeSkills.includes("cloak"));
    node.classList.toggle("in-grass", tankOnGrass(tank, state));
    node.classList.toggle("has-skill", Boolean(skill));
    node.style.setProperty("--skill-color", skillColor(skill));
    setSpritePosition(node, tank.position, tank.direction);
    const name = node.querySelector(".tank-name");
    const skillStatus = node.querySelector(".tank-skill");
    if (name) name.textContent = tank.name;
    if (skillStatus) skillStatus.textContent = tankSkillStatus(tank);
  });
  dom.tanks.slice(state.tanks.length).forEach(function (node) { node.remove(); });
  dom.tanks.length = state.tanks.length;
}

function tankOnGrass(tank, state) {
  const point = normalizePoint(tank?.position);
  if (!point) return false;
  return state.map?.[point[1]]?.[point[0]] === "o";
}

function ensureStarSprite(dom) {
  if (dom.star) return dom.star;
  const node = document.createElement("div");
  node.className = "star";
  dom.board.appendChild(node);
  dom.star = node;
  return node;
}

function ensureEndOverlay(dom) {
  if (dom.endOverlay) return dom.endOverlay;
  const node = document.createElement("div");
  node.className = "end-overlay";
  node.innerHTML = '<strong></strong><span></span>';
  dom.board.appendChild(node);
  dom.endOverlay = node;
  return node;
}

function renderStar(dom, state) {
  if (!state.star) {
    if (dom.star) dom.star.style.display = "none";
    return;
  }
  const star = ensureStarSprite(dom);
  star.style.display = "block";
  star.style.setProperty("--x", (state.star[0] * TILE) + "px");
  star.style.setProperty("--y", (state.star[1] * TILE) + "px");
}

function renderEndOverlay(dom, frame) {
  const overlay = ensureEndOverlay(dom);
  const isFinalFrame = Boolean(replayModel && frames.length && frame.frame >= frames.length - 1);
  overlay.classList.toggle("show", isFinalFrame);
  if (!isFinalFrame) return;
  const winner = replayModel.result?.winner || "draw";
  const reason = replayModel.result?.reason || "unknown";
  overlay.querySelector("strong").textContent = "Winner: " + winner;
  overlay.querySelector("span").textContent = "Reason: " + reason;
}

function bulletKey(bullet, index) {
  return String(bullet.id || bullet.objectId || bullet.tank + "-" + index);
}

function renderBullets(dom, state) {
  const liveKeys = new Set();
  state.bullets.forEach(function (bullet, index) {
    const key = bulletKey(bullet, index);
    liveKeys.add(key);
    let node = dom.bulletsById.get(key);
    const owner = state.tanks.findIndex(function (tank) { return tank.name === bullet.tank; });
    if (!node) {
      node = document.createElement("div");
      node.className = "bullet-sprite";
      dom.board.appendChild(node);
      dom.bulletsById.set(key, node);
    }
    node.style.setProperty("--bullet-color", owner === 0 ? "#ffe36f" : "#67dcff");
    node.style.setProperty("--bullet-shadow", owner === 0 ? "#c97918" : "#126ba0");
    node.style.setProperty("--bullet-tail", owner === 0 ? "rgba(255,143,28,0.58)" : "rgba(42,205,255,0.58)");
    node.style.setProperty("--bullet-glow", owner === 0 ? "rgba(255, 221, 82, 0.95)" : "rgba(72, 210, 255, 0.95)");
    setSpritePosition(node, bullet.position, bullet.direction);
  });
  Array.from(dom.bulletsById.entries()).forEach(function ([key, node]) {
    if (!liveKeys.has(key)) {
      node.remove();
      dom.bulletsById.delete(key);
    }
  });
}

function addImpactBurst(dom, position) {
  const point = normalizePoint(position);
  if (!point) return;
  const node = document.createElement("div");
  node.className = "impact-burst";
  node.style.setProperty("--x", (point[0] * TILE) + "px");
  node.style.setProperty("--y", (point[1] * TILE) + "px");
  dom.board.appendChild(node);
  setTimeout(function () { node.remove(); }, 620);
}

function muzzlePoint(position, direction) {
  const point = normalizePoint(position);
  if (!point) return null;
  const center = [point[0] * TILE + TILE / 2, point[1] * TILE + TILE / 2];
  const delta = DIRS[direction] || DIRS.right;
  return [center[0] + delta[0] * 27, center[1] + delta[1] * 27];
}

function addMuzzleFlash(dom, position, direction) {
  const point = muzzlePoint(position, direction);
  if (!point) return;
  const node = document.createElement("div");
  node.className = "muzzle-flash";
  node.style.setProperty("--x", point[0] + "px");
  node.style.setProperty("--y", point[1] + "px");
  node.style.setProperty("--rot", directionDegrees(direction || "right") + "deg");
  dom.board.appendChild(node);
  setTimeout(function () { node.remove(); }, 240);
}

function addSkillBurst(dom, skill, position) {
  const point = normalizePoint(position);
  if (!point) return;
  const node = document.createElement("div");
  node.className = "skill-burst";
  node.style.setProperty("--x", (point[0] * TILE) + "px");
  node.style.setProperty("--y", (point[1] * TILE) + "px");
  node.style.setProperty("--skill-color", skillColor(skill));
  dom.board.appendChild(node);
  setTimeout(function () { node.remove(); }, 820);
}

function skillBurstPosition(event, state) {
  return eventPoint(event)
    || tankByObject(state, event.targetObjectId)?.position
    || tankByObject(state, event.sourceObjectId)?.position
    || tankByIndex(state, event.by)?.position;
}

function renderTransientEffects(dom, frame, state) {
  (state.impacts || []).forEach(function (impact) {
    if (impact.position) addImpactBurst(dom, impact.position);
  });
  (frame.events || []).forEach(function (event) {
    if (event.type === "bullet" && event.action === "created") {
      const shooter = tankByObject(state, event.tank?.id) || tankByIndex(state, event.by);
      const direction = event.direction || event.tank?.direction || shooter?.direction || "right";
      addMuzzleFlash(dom, event.tank?.position || shooter?.position, direction);
    }
    if (event.type === "bullet" && ["crashed", "hit", "blocked", "mound"].includes(event.action)) {
      addImpactBurst(dom, eventPoint(event));
    }
    if (event.type === "map" && event.action === "destroyed") {
      addImpactBurst(dom, eventPoint(event));
    }
    if (event.type === "tank" && event.action === "crashed") {
      addImpactBurst(dom, tankByObject(state, event.objectId)?.position || tankByIndex(state, event.index)?.position);
    }
    if (event.type === "skill" && ["cast", "applied", "failed"].includes(event.action || "cast")) {
      addSkillBurst(dom, skillNameForEvent(event), skillBurstPosition(event, state));
    }
  });
}

function renderBattlefield(frame, state) {
  const dom = ensureBattlefield(state.map);
  renderStar(dom, state);
  renderTankSprites(dom, state);
  renderBullets(dom, state);
  renderTransientEffects(dom, frame, state);
  renderEndOverlay(dom, frame);
}

function renderSidePanel(frame, state) {
  frameLabel.textContent = "Frame " + current + " / " + Math.max(0, frames.length - 1);
  eventCount.textContent = frame.events.length + " events";
  tanksEl.innerHTML = state.tanks.map(function (tank, index) {
    const cls = index === 0 ? "left" : "right";
    const skills = activeSkillNames(tank).map(function (skill) {
      const effect = tank.activeSkills[skill];
      return skill + (effect?.remainingFrames ? " " + effect.remainingFrames + "f" : "");
    }).join(", ") || "-";
    const stats = tank.skillStats || emptySkillStats();
    return '<section class="tank"><strong><span class="' + cls + '">' + escapeHtml(tank.name) + '</span><span>' + escapeHtml(tank.skill) + '</span></strong><dl>' +
      '<dt>Position</dt><dd>[' + tank.position.join(", ") + ']</dd>' +
      '<dt>Direction</dt><dd>' + escapeHtml(tank.direction) + '</dd>' +
      '<dt>Stars</dt><dd>' + tank.stars + '</dd>' +
      '<dt>Skill uses</dt><dd>' + stats.cast + '</dd>' +
      '<dt>Active skill</dt><dd>' + escapeHtml(skills) + '</dd>' +
      '<dt>Last skill</dt><dd>' + escapeHtml(tank.lastSkill || "-") + '</dd>' +
      '<dt>Status</dt><dd>' + escapeHtml(tank.crashed ? "crashed " + tank.reason : "active") + '</dd>' +
      '</dl></section>';
  }).join("");
  eventsEl.innerHTML = renderBehaviorList();
  timeline.value = String(current);
}

function draw() {
  if (!frames.length) {
    battleDom = null;
    battleStage.innerHTML = '<div class="battle-empty">Load a replay to show the battlefield.</div>';
    return;
  }

  const frame = frames[current];
  const state = frame.state;
  renderBattlefield(frame, state);
  renderSidePanel(frame, state);
}

function setFrame(value) {
  if (!frames.length) return;
  current = Math.max(0, Math.min(frames.length - 1, value));
  draw();
}

function stop() {
  if (timer) clearInterval(timer);
  timer = null;
  playBtn.textContent = "播放";
}

function play() {
  if (!frames.length) return;
  if (timer) {
    stop();
    return;
  }
  playBtn.textContent = "暂停";
  timer = setInterval(function () {
    if (current >= frames.length - 1) {
      stop();
      return;
    }
    setFrame(current + 1);
  }, Number(speed.value));
}

document.getElementById("file").addEventListener("change", async function () {
  const file = this.files && this.files[0];
  if (!file) return;
  stop();
  try {
    await loadText(await file.text());
  } catch (error) {
    resultEl.textContent = "Load failed: " + (error.message || error);
  }
});

async function loadUrlSource(source) {
  if (!source) return false;
  stop();
  try {
    let payload = await fetchOfficialJson(source);
    if (!payload.replayData?.replay?.records && (payload.links?.raw || payload.rawReplayUrl)) {
      payload = await fetchOfficialJson(payload.links?.raw || payload.rawReplayUrl);
    }
    await loadOfficialPayload(payload);
    return true;
  } catch (error) {
    resultEl.textContent = "Load failed: " + (error.message || error);
    return false;
  }
}

document.getElementById("loadUrl").addEventListener("click", async function () {
  await loadUrlSource(document.getElementById("url").value.trim());
});

loadMatchesBtn.addEventListener("click", function () {
  loadMatchPage(0);
});
prevMatchesBtn.addEventListener("click", function () {
  loadMatchPage(Math.max(0, matchOffset - MATCH_PAGE_SIZE));
});
nextMatchesBtn.addEventListener("click", function () {
  loadMatchPage(matchOffset + MATCH_PAGE_SIZE);
});
tankKeyInput.addEventListener("keydown", function (event) {
  if (event.key === "Enter") loadMatchPage(0);
});
matchListEl.addEventListener("click", function (event) {
  const button = event.target.closest(".replay-match");
  if (!button) return;
  replayMatch(matchRows[Number(button.dataset.index)], button);
});

document.getElementById("back10").addEventListener("click", function () { stop(); setFrame(current - 10); });
document.getElementById("prev").addEventListener("click", function () { stop(); setFrame(current - 1); });
document.getElementById("play").addEventListener("click", play);
document.getElementById("next").addEventListener("click", function () { stop(); setFrame(current + 1); });
document.getElementById("forward10").addEventListener("click", function () { stop(); setFrame(current + 10); });
speed.addEventListener("change", function () { if (timer) { stop(); play(); } });
timeline.addEventListener("input", function () { stop(); setFrame(Number(timeline.value)); });
window.addEventListener("keydown", function (event) {
  if (event.key === " ") {
    event.preventDefault();
    play();
  } else if (event.key === "ArrowLeft") {
    stop();
    setFrame(current - 1);
  } else if (event.key === "ArrowRight") {
    stop();
    setFrame(current + 1);
  }
});
window.addEventListener("resize", fitBattlefield);

draw();
renderMatchList();
const initialSource = new URLSearchParams(location.search).get("match") || decodeURIComponent(location.hash.replace(/^#/, ""));
if (initialSource) {
  document.getElementById("url").value = initialSource;
  loadUrlSource(initialSource);
}
</script>
</body>
</html>
